<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form | Emma Kariuki</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f7fb; color: #222;">
    <header style="background: linear-gradient(135deg, #2f4f4f, #4d7a7a); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
        <h1 style="margin: 0;">Contact Emma Kariuki</h1>
    </header>

    <main>
        <section id="contact-form" style="background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); max-width: 600px; margin: 0 auto;">
            <h2 id="contact-heading" style="margin-top: 0; color: #2f4f4f;">Get in Touch</h2>
            <form action="#" method="post">
                <fieldset style="border: 1px solid #d9e2ec; border-radius: 8px; padding: 15px;">
                    <legend style="font-weight: bold; color: #2f4f4f;">Send me a message</legend>

                    <label for="name" style="display: block; margin-top: 10px; font-weight: bold;">Name:</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

                    <label for="email" style="display: block; margin-top: 10px; font-weight: bold;">Email:</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

                    <label for="phone" style="display: block; margin-top: 10px; font-weight: bold;">Phone:</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

                    <label for="message" style="display: block; margin-top: 10px; font-weight: bold;">Message:</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;"></textarea>

                    <button type="submit" style="margin-top: 15px; padding: 10px 15px; background-color: #2f4f4f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Send Message</button>
                </fieldset>
            </form>
        </section>
    </main>

    <footer style="text-align: center; color: #666; margin-top: 20px;">
        <p>Thank you for reaching out.</p>
    </footer>
</body>
</html>
