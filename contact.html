<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        main {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.25rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        .checkbox-wrapper {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .checkbox-wrapper label {
            margin-top: 0;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <a href="index.html">Home</a> | 
            <a href="about.html">About</a> | 
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <form action="/submit" method="POST" novalidate>
            <!-- Full Name -->
            <label for="fullname">Full Name *</label>
            <input type="text" id="fullname" name="fullname" required>

            <!-- Email -->
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>

            <!-- Phone -->
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="+254 7xx xxx">

            <!-- Subject - Fixed: dropdown with 3 options -->
            <label for="subject">Subject *</label>
            <select id="subject" name="subject" required>
                <option value="" disabled selected>Select a subject</option>
                <option value="general">General Inquiry</option>
                <option value="support">Technical Support</option>
                <option value="feedback">Feedback</option>
            </select>

            <!-- Message -->
            <label for="message">Message *</label>
            <textarea id="message" name="message" required minlength="50" 
                placeholder="Minimum 50 characters..."></textarea>

            <!-- Newsletter - Fixed typo -->
            <div class="checkbox-wrapper">
                <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                <label for="newsletter">Newsletter subscription</label>
            </div>

            <!-- Submit -->
            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
